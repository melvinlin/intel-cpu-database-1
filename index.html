        }

        .container {

        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);

            padding: 2rem 0;

        .stat-item {

        @media (max-width: 768px) {

        .loading {

    </style>
</head>

    <script src="data.js"></script>
    <script>
        // 鍏ㄥ眬鍙橀噺
        let allGenerations = [];
        let filteredGenerations = [];

        // 鍒濆鍖?        document.addEventListener('DOMContentLoaded', function() {
            if (typeof INTEL_CPU_DATA !== 'undefined') {
                allGenerations = INTEL_CPU_DATA.generations;
                filteredGenerations = [...allGenerations];
                renderGenerations();
                setupSearch();
                updateStats();
            }
        });

        // 娓叉煋浠ｉ檯鍗＄墖
        function renderGenerations() {
            const container = document.getElementById('generationsContainer');
            const noResults = document.getElementById('noResults');
            
            if (filteredGenerations.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = '';
            
            filteredGenerations.forEach(gen => {
                const card = document.createElement('div');
                card.className = 'generation-card';
                card.dataset.genId = gen.id;
                
                // 璁＄畻璇ヤ唬闄呯殑 CPU 鏁伴噺
                const cpuCount = gen.cpus ? gen.cpus.length : 0;
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="gen-name">${gen.name}</div>
                        <div class="gen-years">${gen.years}</div>
                    </div>
                    <div class="card-body">
                        <div class="gen-info">
                            <span class="info-tag">${gen.codeName}</span>
                            <span class="info-tag">${gen.processNodes.join(' / ')}</span>
                            <span class="info-tag">${gen.socket}</span>
                        </div>
                        <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 1rem;">${gen.highlights}</p>
                        
                        <div class="cpu-list">
                            ${gen.cpus ? gen.cpus.slice(0, 3).map(cpu => `
                                <div class="cpu-item" onclick="showCpuDetail('${gen.id}', '${cpu.model}')">
                                    <div class="cpu-model">${cpu.model}</div>
                                    <div class="cpu-specs">${cpu.cores}鏍?{cpu.threads}绾跨▼</div>
                                </div>
                            `).join('') : ''}
                        </div>
                        
                        ${cpuCount > 3 ? `<div style="text-align: center; padding: 0.5rem; color: var(--primary); font-size: 0.9rem;">+ ${cpuCount - 3} 涓瀷鍙?/div>` : ''}
                        
                        <a href="#" class="view-details" onclick="showGenerationDetail('${gen.id}')">鏌ョ湅鍏ㄩ儴鍨嬪彿</a>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 璁剧疆鎼滅储鍔熻兘
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                
                if (searchTerm === '') {
                    filteredGenerations = [...allGenerations];
                } else {
                    filteredGenerations = allGenerations.filter(gen => {
                        // 鎼滅储浠ｉ檯鍚嶇О銆佷唬鍙枫€佸勾浠?                        if (gen.name.toLowerCase().includes(searchTerm) ||
                            gen.codeName.toLowerCase().includes(searchTerm) ||
                            gen.years.toLowerCase().includes(searchTerm) ||
                            gen.socket.toLowerCase().includes(searchTerm)) {
                            return true;
                        }
                        
                        // 鎼滅储璇ヤ唬闄呬笅鐨?CPU 鍨嬪彿
                        if (gen.cpus) {
                            return gen.cpus.some(cpu => 
                                cpu.model.toLowerCase().includes(searchTerm) ||
                                cpu.brand.toLowerCase().includes(searchTerm)
                            );
                        }
                        
                        return false;
                    });
                }
                
                renderGenerations();
                updateStats();
            });
        }

        // 鏇存柊缁熻淇℃伅
        function updateStats() {
            const totalCpus = filteredGenerations.reduce((sum, gen) => {
                return sum + (gen.cpus ? gen.cpus.length : 0);
            }, 0);
            
            document.getElementById('total-generations').textContent = filteredGenerations.length;
            document.getElementById('total-cpus').textContent = totalCpus + '+';
        }

        // 鏄剧ず浠ｉ檯璇︽儏
        function showGenerationDetail(genId) {
            const gen = allGenerations.find(g => g.id === genId);
            if (!gen) return;
            
            const modal = document.getElementById('cpuModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = `${gen.name} (${gen.years})`;
            
            let cpuListHTML = '';
            if (gen.cpus && gen.cpus.length > 0) {
                cpuListHTML = gen.cpus.map(cpu => `
                    <div class="cpu-item" style="cursor: pointer;" onclick="showCpuDetail('${genId}', '${cpu.model}')">
                        <div>
                            <div class="cpu-model">${cpu.model}</div>
                            <div style="font-size: 0.85rem; color: var(--gray); margin-top: 0.25rem;">
                                ${cpu.brand} | ${cpu.cores}鏍?{cpu.threads}绾跨▼ | ${cpu.baseClock} | ${cpu.tdp}
                            </div>
                        </div>
                        <div style="color: var(--primary); font-size: 0.9rem;">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>
                `).join('');
            }
            
            modalBody.innerHTML = `
                <div class="spec-card">
                    <div class="spec-label">浠ｅ彿</div>
                    <div class="spec-value">${gen.codeName}</div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-label">鍒剁▼宸ヨ壓</div>
                    <div class="spec-value">${gen.processNodes.join(' / ')}</div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-label">鎻掓Ы绫诲瀷</div>
                    <div class="spec-value">${gen.socket}</div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-label">鏋舵瀯</div>
                    <div class="spec-value">${gen.architecture}</div>
                </div>
                
                <div class="highlight">
                    <div class="highlight-title">浠ｉ檯浜偣</div>
                    <p>${gen.highlights}</p>
                </div>
                
                <h3 style="margin: 1.5rem 0 1rem 0;">鍖呭惈鍨嬪彿 (${gen.cpus ? gen.cpus.length : 0}娆?</h3>
                <div class="cpu-list">
                    ${cpuListHTML || '<p style="color: var(--gray); text-align: center; padding: 2rem;">鏆傛棤鏁版嵁</p>'}
                </div>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <button class="back-button" onclick="closeModal()">杩斿洖鍒楄〃</button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        // 鏄剧ず CPU 璇︽儏
        function showCpuDetail(genId, cpuModel) {
            const gen = allGenerations.find(g => g.id === genId);
            if (!gen) return;
            
            const cpu = gen.cpus.find(c => c.model === cpuModel);
            if (!cpu) return;
            
            const modal = document.getElementById('cpuModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = cpu.model;
            
            // 鍒ゆ柇鏄惁鏀寔瓒呴
            const overclockText = cpu.unlocked ? '鏀寔' : '涓嶆敮鎸?;
            const overclockClass = cpu.unlocked ? 'success' : 'secondary';
            
            // 鍒ゆ柇鏄惁鏈夋贩鍚堟灦鏋?            const hasHybrid = cpu.pCores !== null && cpu.eCores !== null;
            const coreDetail = hasHybrid ? 
                `${cpu.pCores}P + ${cpu.eCores}E 鏍稿績` : 
                `${cpu.cores} 鏍稿績`;
            
            modalBody.innerHTML = `
                <div class="cpu-detail-header">
                    <div>
                        <div class="cpu-title">${cpu.model}</div>
                        <div style="color: var(--gray); margin-top: 0.5rem;">${gen.name} | ${gen.years}</div>
                    </div>
                    <div class="cpu-badge">${cpu.brand}</div>
                </div>
                
                <div class="specs-grid">
                    <div class="spec-card">
                        <div class="spec-label">鏍稿績/绾跨▼</div>
                        <div class="spec-value">${coreDetail} / ${cpu.threads}绾跨▼</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鍩虹棰戠巼</div>
                        <div class="spec-value">${cpu.baseClock}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鏈€澶х澘棰?/div>
                        <div class="spec-value">${cpu.boostClock}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">TDP</div>
                        <div class="spec-value">${cpu.tdp}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鍒剁▼宸ヨ壓</div>
                        <div class="spec-value">${cpu.process}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鎻掓Ы绫诲瀷</div>
                        <div class="spec-value">${cpu.socket}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">闆嗘垚鏄惧崱</div>
                        <div class="spec-value">${cpu.igpu}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">瓒呴鏀寔</div>
                        <div class="spec-value" style="color: ${cpu.unlocked ? 'var(--success)' : 'var(--secondary)'}">${overclockText}</div>
                    </div>
                </div>
                
                <div class="specs-grid">
                    <div class="spec-card">
                        <div class="spec-label">涓夌骇缂撳瓨</div>
                        <div class="spec-value">${cpu.l3Cache}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鍐呭瓨鏀寔</div>
                        <div class="spec-value">${cpu.memorySupport}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鏈€澶у唴瀛?/div>
                        <div class="spec-value">${cpu.maxMemory}</div>
                    </div>
                    
                    <div class="spec-card">
                        <div class="spec-label">鍙戝竷鏃ユ湡</div>
                        <div class="spec-value">${cpu.releaseDate}</div>
                    </div>
                </div>
                
                <div class="highlight">
                    <div class="highlight-title">浠ｉ檯浜偣</div>
                    <p>${gen.highlights}</p>
                </div>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <button class="back-button" onclick="showGenerationDetail('${genId}')" style="margin-right: 1rem;">杩斿洖浠ｉ檯</button>
                    <button class="back-button" onclick="closeModal()">杩斿洖鍒楄〃</button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        // 鍏抽棴妯℃€佹
        function closeModal() {
            document.getElementById('cpuModal').style.display = 'none';
        }

        // 鏄剧ず鍏充簬妯℃€佹
        function showAbout() {
            document.getElementById('aboutModal').style.display = 'block';
        }

        // 鍏抽棴鍏充簬妯℃€佹
        function closeAboutModal() {
            document.getElementById('aboutModal').style.display = 'none';
        }

        // 鐐瑰嚮妯℃€佹澶栭儴鍏抽棴
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
